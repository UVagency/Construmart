[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/360/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA-ish: let /experience and /success resolve without .html
[[redirects]]
  from = "/experience"
  to = "/experience.html"
  status = 200

[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200
